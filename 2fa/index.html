<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Tạo Mã 2FA Toàn Diện</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.3.6/otpauth.umd.min.js"></script>
    <style>
        :root {
            --primary-color: #0071e3;
            --background-color: #f5f5f7;
            --card-background: #ffffff;
            --text-color: #1d1d1f;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-background);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #6e6e73;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0077ed;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #f5f5f7;
            border-radius: 8px;
            display: none;
        }

        .otp-code {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--primary-color);
            margin-bottom: 10px;
            cursor: pointer;
        }

        .timer {
            font-size: 14px;
            color: #86868b;
        }

        .error {
            color: #ff3b30;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Trình Xác Thực 2FA</h2>
    
    <div class="input-group">
        <label for="secretKey">Nhập Secret Key (Chuỗi khóa bí mật):</label>
        <input type="text" id="secretKey" placeholder="Ví dụ: JBSWY3DPEHPK3PXP..." autocomplete="off">
        <div id="errorMessage" class="error">Secret Key không hợp lệ. Vui lòng kiểm tra lại!</div>
    </div>
    
    <button onclick="start2FA()">Lấy Mã OTP</button>

    <div id="resultBox" class="result-box">
        <div class="otp-code" id="otpCode" onclick="copyToClipboard()" title="Bấm để sao chép">------</div>
        <div class="timer" id="timer">Mã sẽ cập nhật sau: -- giây</div>
    </div>
</div>

<script>
    let intervalId = null;

    function cleanSecret(secret) {
        // Xóa khoảng trắng và chuyển thành chữ in hoa
        return secret.replace(/\s+/g, '').toUpperCase();
    }

    function generateOTP(secret) {
        try {
            // Khởi tạo đối tượng TOTP từ thư viện OTPAuth
            const totp = new OTPAuth.TOTP({
                issuer: "2FA Generator",
                label: "User",
                algorithm: "SHA1",
                digits: 6,
                period: 30,
                secret: OTPAuth.Secret.fromBase32(secret)
            });

            // Lấy mã code hiện tại
            const code = totp.generate();
            
            // Tính toán thời gian còn lại của chu kỳ 30s
            const secondsRemaining = 30 - Math.floor((Date.now() / 1000) % 30);
            
            // Hiển thị kết quả
            document.getElementById('otpCode').innerText = code.slice(0, 3) + ' ' + code.slice(3);
            document.getElementById('timer').innerText = `Mã sẽ cập nhật sau: ${secondsRemaining} giây`;
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        } catch (error) {
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';
            clearInterval(intervalId);
        }
    }

    function start2FA() {
        const rawSecret = document.getElementById('secretKey').value;
        const cleanedSecret = cleanSecret(rawSecret);

        if (!cleanedSecret) {
            document.getElementById('errorMessage').innerText = "Vui lòng nhập Secret Key!";
            document.getElementById('errorMessage').style.display = 'block';
            return;
        }

        // Xóa interval cũ nếu có để tránh chạy trùng lặp
        if (intervalId) clearInterval(intervalId);

        // Chạy lần đầu tiên ngay lập tức
        generateOTP(cleanedSecret);

        // Tự động cập nhật mỗi giây (để đếm ngược thời gian và đổi mã sau 30s)
        intervalId = setInterval(() => {
            generateOTP(cleanedSecret);
        }, 1000);
    }

    function copyToClipboard() {
        const codeText = document.getElementById('otpCode').innerText.replace(' ', '');
        navigator.clipboard.writeText(codeText).then(() => {
            alert('Đã sao chép mã OTP vào bộ nhớ tạm!');
        }).catch(err => {
            console.error('Không thể sao chép: ', err);
        });
    }
</script>

</body>
</html>
